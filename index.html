<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legende de sévérité SIEM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="legende-couleurs">
        <h2>Code Couleur des Incidents</h2>
        <ul class="boite-legende">
            <li class="item-severite severitee-critique">
                <span class="pastille"></span>
                <p><strong>Niveau 4 - Critique</strong> Action immédiate requise</p>
            </li>
              <li class="item-severite severitee-elevee">
                <span class="pastille"></span>
                <p><strong>Niveau 3 - Elevé</strong> Menace active détectée</p>
            </li>
              <li class="item-severite severitee-moyen">
                <span class="pastille"></span>
                <p><strong>Niveau 2 - Moyen</strong> Surveillance requise</p>
            </li>
              <li class="item-severite severitee-faible">
                <span class="pastille"></span>
                <p><strong>Niveau 1 - Faible</strong> Information uniquement</p>
            </li>
        </ul>
    </section>
</body>
</html>
